---
# OWASP ZAP Automation Framework Configuration
# Target: Personal Budget & Expense Tracking Web Application
# Date: 2025-06-18
# Team: Hammad Asghar, Faiq Ashfaq, Shahzaib

env:
  contexts:
    - name: "Budget Tracker - Authenticated Scan"
      urls:
        - "http://localhost:8000"
      includePaths:
        - "http://localhost:8000.*"
      excludePaths:
        - "http://localhost:8000/logout"
      authentication:
        method: "formBasedAuthentication"
        loginUrl: "http://localhost:8000/login"
        loginRequestData: "email={%username%}&password={%password%}&_token={%token%}"
        loggedInIndicator: "\\Qdashboard\\E"
        loggedOutIndicator: "\\Qlogin\\E"
      users:
        - name: "testuser"
          credentials:
            username: "testuser@example.com"
            password: "password123"

  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: "spider"
    parameters:
      context: "Budget Tracker - Authenticated Scan"
      user: "testuser"
      maxDuration: 5
      maxDepth: 10
    tests:
      - name: "At least 20 URLs found"
        type: "stats"
        statistic: "automation.spider.urls.added"
        operator: ">="
        value: 20

  - type: "spiderAjax"
    parameters:
      context: "Budget Tracker - Authenticated Scan"
      user: "testuser"
      maxDuration: 3
      browserId: "chrome-headless"

  - type: "passiveScan-wait"
    parameters:
      maxDuration: 5

  - type: "activeScan"
    parameters:
      context: "Budget Tracker - Authenticated Scan"
      user: "testuser"
      policy: "Default Policy"
      maxAlertsPerRule: 10
      scanRuleIds: ""
    policyDefinition:
      defaultStrength: "medium"
      defaultThreshold: "medium"
      rules:
        - id: 40012    # Cross Site Scripting (Reflected)
          name: "XSS Reflected"
          strength: "high"
          threshold: "low"
        - id: 40014    # Cross Site Scripting (Persistent)
          name: "XSS Persistent"
          strength: "high"
          threshold: "low"
        - id: 40018    # SQL Injection
          name: "SQL Injection"
          strength: "high"
          threshold: "low"
        - id: 40019    # SQL Injection (MySQL)
          name: "SQL Injection MySQL"
          strength: "high"
          threshold: "low"
        - id: 40020    # SQL Injection (Hypersonic)
          name: "SQL Injection Hypersonic"
          strength: "medium"
          threshold: "medium"
        - id: 90019    # Server Side Code Injection
          name: "Server Side Code Injection"
          strength: "high"
          threshold: "low"
        - id: 90020    # Remote OS Command Injection
          name: "Remote OS Command Injection"
          strength: "high"
          threshold: "low"
        - id: 40003    # CRLF Injection
          name: "CRLF Injection"
          strength: "medium"
          threshold: "medium"
        - id: 90022    # Application Error Disclosure
          name: "Application Error Disclosure"
          strength: "medium"
          threshold: "medium"
        - id: 10010    # Cookie No HttpOnly Flag
          name: "Cookie No HttpOnly"
          strength: "low"
          threshold: "low"
        - id: 10011    # Cookie Without Secure Flag
          name: "Cookie Without Secure Flag"
          strength: "low"
          threshold: "low"
        - id: 10202    # Absence of Anti-CSRF Tokens
          name: "Absence of Anti-CSRF Tokens"
          strength: "high"
          threshold: "low"

  - type: "report"
    parameters:
      template: "traditional-html"
      reportDir: "../../reports/security"
      reportFile: "zap-html-report"
      reportTitle: "OWASP ZAP Security Scan - Budget Tracker"
      reportDescription: "Automated DAST security scan of Personal Budget & Expense Tracking Web Application"

  - type: "report"
    parameters:
      template: "traditional-json"
      reportDir: "../../reports/security"
      reportFile: "zap-json-report"